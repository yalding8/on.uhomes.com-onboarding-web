name: Main Branch Guard

# 在代码合并/推送到 main 后立即运行质检。
# 如果质检失败，自动 revert 并创建 Issue 告警。
# 这是 GitHub Free 私有仓库下的「软门禁」替代方案。

on:
  push:
    branches: ["main"]

jobs:
  post-merge-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Formatter Check
        run: npm run format:check

      - name: ESLint Check
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Single File Lines Check (<= 300)
        run: bash scripts/check-file-lines.sh

      - name: Vitest Checks
        run: npm run test:ci

      - name: Production Build Verification
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  auto-revert:
    runs-on: ubuntu-latest
    needs: post-merge-gate
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Revert Last Commit
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          git revert --no-edit HEAD
          git push origin main
          echo "REVERTED_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "REVERTED_MSG=$COMMIT_MSG" >> $GITHUB_ENV

      - name: Create Alert Issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = process.env.REVERTED_SHA;
            const msg = process.env.REVERTED_MSG;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 质检失败自动回滚: ${msg}`,
              body: [
                `## 自动回滚通知`,
                ``,
                `提交 \`${sha}\` 合并到 main 后质检未通过，已被自动 revert。`,
                ``,
                `**被回滚的提交**: \`${sha}\``,
                `**提交信息**: ${msg}`,
                `**CI 运行详情**: [查看日志](${runUrl})`,
                ``,
                `### 下一步`,
                `1. 查看 CI 日志定位失败原因`,
                `2. 在 feature 分支修复后重新提交 PR`,
                `3. 确认 PR 的 CI 全绿后再 merge`,
              ].join('\n'),
              labels: ['bug', 'ci-failure'],
            });
