name: Main Branch Guard

# 在代码合并/推送到 main 后立即运行质检。
# 质检失败会创建 Issue 告警（不再自动 revert，由 Branch Protection 前置拦截）。

on:
  push:
    branches: ["main"]

jobs:
  post-merge-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Formatter Check
        run: npm run format:check

      - name: ESLint Check
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Single File Lines Check (warning only)
        run: bash scripts/check-file-lines.sh || true

      - name: Vitest Checks
        run: npm run test:ci

      - name: Production Build Verification
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  alert-on-failure:
    runs-on: ubuntu-latest
    needs: post-merge-gate
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create Alert Issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const msg = context.payload.head_commit?.message || 'Unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 质检失败: ${msg.split('\n')[0]}`,
              body: [
                `## 质检失败通知`,
                ``,
                `提交 \`${sha}\` 合并到 main 后质检未通过。`,
                ``,
                `**提交**: \`${sha}\``,
                `**提交信息**: ${msg.split('\n')[0]}`,
                `**CI 运行详情**: [查看日志](${runUrl})`,
                ``,
                `### 下一步`,
                `1. 查看 CI 日志定位失败原因`,
                `2. 在 feature 分支修复后提交 PR`,
                `3. 确认 PR 的 CI 全绿后再 merge`,
              ].join('\n'),
              labels: ['bug', 'ci-failure'],
            });

  sync-gitlab:
    runs-on: ubuntu-latest
    needs: post-merge-gate
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to GitLab
        env:
          GITLAB_SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$GITLAB_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 20022 git.uhomes.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote add gitlab ssh://git@git.uhomes.com:20022/ning_ding/on.uhomes.com.git
          git push gitlab --all --no-thin
          git push gitlab --tags
