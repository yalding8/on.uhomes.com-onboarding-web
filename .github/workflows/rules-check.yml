name: AI Rules Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rules-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AI Rules Check
        run: |
          chmod +x scripts/check-rules.sh
          ./scripts/check-rules.sh

      - name: Run TypeScript Check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npm run format:check

      - name: Run Build
        run: npm run build
